name: NGX Daily Digest

# Runs every weekday at 15:35 WAT (14:35 UTC), just after the 14:30 market close.
# You can also trigger it manually from the Actions tab.
on:
  schedule:
    - cron: "35 14 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write   # allows the workflow to commit the daily digest back to the repo

jobs:
  build-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}
          PUSH_TO_NOTION: ${{ vars.PUSH_TO_NOTION }}
        run: python ngx_daily.py

      - name: Commit digest
        run: |
          git config user.name "ngx-bot"
          git config user.email "ngx-bot@users.noreply.github.com"
          git add output/ || true
          if ! git diff --cached --quiet; then
            git commit -m "NGX digest $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No new digest to commit."
          fi
